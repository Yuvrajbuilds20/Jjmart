<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JJ Mart — Groceries & Daily Essentials, Delivered</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  /* Fresh, vibrant grocery palette */
  --paper: #F7FBF4; --paper-deep: #EAF4E3; --ink: #1A2E1D; --ink-soft: #4A6550;
  --stamp: #FF5722; --stamp-dark: #E64A19; --moss: #2ECC71; --moss-dark: #27AE60;
  --gold: #FFB300; --teal: #00BCD4; --purple: #7C4DFF; --pink: #FF4081;
  --white: #FFFFFF; --line: #C8E6C9; --radius: 14px;
  --shadow-sm: 0 2px 8px rgba(26,46,29,0.10);
  --shadow-md: 0 6px 24px rgba(26,46,29,0.13);
  --shadow-lg: 0 16px 48px rgba(26,46,29,0.16);
}

@keyframes float {
  0%, 100% { transform: translateY(0px) rotate(-8deg); }
  50% { transform: translateY(-8px) rotate(-8deg); }
}
@keyframes pulse-ring {
  0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46,204,113,0.5); }
  70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(46,204,113,0); }
  100% { transform: scale(0.95); }
}
@keyframes shimmer {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}
@keyframes slide-in-up {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes wiggle {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(-5deg); }
  75% { transform: rotate(5deg); }
}
@keyframes bounce-in {
  0% { transform: scale(0.7); opacity: 0; }
  60% { transform: scale(1.15); }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes marquee {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; min-height: 100%; overflow-x: hidden; width: 100%; }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; text-decoration: none; cursor: pointer; }
button { font-family: inherit; cursor: pointer; }
h1, h2, h3, .display { font-family: 'Nunito', sans-serif; font-weight: 800; letter-spacing: -0.02em; line-height: 1.1; }
.mono { font-family: 'JetBrains Mono', monospace; }
:focus-visible { outline: 3px solid var(--moss); outline-offset: 2px; border-radius: 4px; }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
.container { max-width: 1240px; margin: 0 auto; padding: 0 20px; width: 100%; box-sizing: border-box; }

/* ---------- Topbar: animated marquee strip ---------- */
.topbar {
  background: linear-gradient(90deg, var(--moss-dark), var(--teal), var(--moss-dark));
  background-size: 200% auto;
  animation: shimmer 4s linear infinite;
  color: var(--white); font-size: 12.5px; padding: 0; text-align: center;
  font-family: 'JetBrains Mono', monospace; letter-spacing: 0.01em;
  overflow: hidden; white-space: nowrap; height: 34px; display: flex; align-items: center;
}
.topbar-marquee {
  display: inline-flex; gap: 0; animation: marquee 22s linear infinite; white-space: nowrap;
}
.topbar-marquee span { padding: 0 32px; }

/* ---------- Header ---------- */
.header {
  background: var(--white); position: sticky; top: 0; z-index: 50;
  border-bottom: 1px solid var(--line);
  box-shadow: var(--shadow-sm);
}
.header-inner { display: flex; align-items: center; gap: 22px; padding: 14px 20px; flex-wrap: wrap; }
.logo {
  font-family: 'Nunito', sans-serif; color: var(--ink); font-size: 26px; font-weight: 900;
  display: flex; align-items: center; gap: 6px; white-space: nowrap; letter-spacing: -0.03em;
}
.logo .logo-icon {
  width: 36px; height: 36px; background: linear-gradient(135deg, var(--moss), var(--teal));
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
  font-size: 18px; box-shadow: 0 3px 10px rgba(46,204,113,0.35);
}
.logo span { color: var(--moss-dark); }
.logo small {
  font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 9px; color: var(--white);
  letter-spacing: 0.06em; background: var(--stamp); padding: 2px 6px; border-radius: 6px;
  align-self: flex-end; margin-bottom: 4px;
}
.search-bar {
  flex: 1; display: flex; background: var(--paper); border: 2px solid var(--line); border-radius: 50px;
  overflow: hidden; max-width: 560px; min-width: 200px; transition: border-color .2s, box-shadow .2s;
}
.search-bar:focus-within { border-color: var(--moss); box-shadow: 0 0 0 4px rgba(46,204,113,0.12); }
.search-bar input { flex: 1; border: none; outline: none; padding: 11px 18px; font-size: 14px; font-family: inherit; background: transparent; }
.search-bar button {
  background: linear-gradient(135deg, var(--moss), var(--moss-dark)); border: none; padding: 0 22px;
  color: var(--white); font-size: 16px; border-radius: 0 50px 50px 0; transition: opacity .15s;
}
.search-bar button:hover { opacity: 0.88; }
.header-actions { display: flex; align-items: center; gap: 16px; color: var(--ink); font-size: 13.5px; font-weight: 700; }
.header-actions a, .header-actions button {
  background: none; border: none; color: var(--ink-soft); display: flex; align-items: center; gap: 6px;
  font-weight: 700; font-size: 13.5px; position: relative; transition: color .15s;
}
.header-actions a:hover, .header-actions button:hover { color: var(--moss-dark); }
.cart-badge {
  background: linear-gradient(135deg, var(--stamp), var(--pink)); color: var(--white); font-size: 10px;
  font-weight: 800; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center;
  justify-content: center; position: absolute; top: -8px; right: -10px;
  animation: bounce-in 0.3s ease-out; box-shadow: 0 2px 6px rgba(255,87,34,0.4);
}

/* ---------- Category nav: colorful pill tabs ---------- */
.category-nav { background: var(--white); border-bottom: 1px solid var(--line); overflow-x: auto; }
.category-nav::-webkit-scrollbar { height: 0; }
.category-nav-inner { display: flex; gap: 8px; padding: 10px 20px; max-width: 1240px; margin: 0 auto; }
.category-nav a {
  color: var(--ink-soft); font-size: 13px; font-weight: 700; padding: 8px 18px; white-space: nowrap;
  border-radius: 50px; display: inline-block; background: var(--paper);
  border: 1.5px solid var(--line); transition: all .18s ease;
}
.category-nav a:hover { background: var(--paper-deep); border-color: var(--moss); color: var(--moss-dark); transform: translateY(-1px); }
.category-nav a.active {
  background: linear-gradient(135deg, var(--moss), var(--moss-dark)); color: var(--white);
  border-color: transparent; box-shadow: 0 3px 10px rgba(46,204,113,0.35);
}

/* ---------- Hero: fresh gradient with floating elements ---------- */
.hero {
  background: linear-gradient(135deg, #0A3D1F 0%, #1A6B38 40%, #00897B 100%);
  color: var(--white); padding: 0; position: relative; overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute; inset: 0;
  background-image: radial-gradient(circle at 80% 20%, rgba(255,179,0,0.12) 0%, transparent 50%),
    radial-gradient(circle at 20% 80%, rgba(0,188,212,0.10) 0%, transparent 50%);
  pointer-events: none;
}
/* Decorative floating blobs */
.hero::after {
  content: '🌿';
  position: absolute; top: -20px; right: 8%; font-size: 120px; opacity: 0.08;
  animation: float 5s ease-in-out infinite; pointer-events: none;
}
.hero-inner {
  display: grid; grid-template-columns: 1.3fr 0.7fr; gap: 0; align-items: stretch; min-height: 320px;
  max-width: 1240px; margin: 0 auto; position: relative; z-index: 1;
}
.hero-copy { padding: 64px 20px 56px; max-width: 600px; animation: slide-in-up .6s ease-out; }
.hero-copy .eyebrow {
  font-family: 'JetBrains Mono', monospace; font-size: 11.5px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 16px; display: inline-flex; align-items: center; gap: 8px;
  background: rgba(255,179,0,0.12); padding: 5px 14px; border-radius: 50px; border: 1px solid rgba(255,179,0,0.25);
}
.hero-copy .eyebrow::before { content: '●'; animation: pulse-ring 2s infinite; color: var(--gold); font-size: 8px; }
.hero h1 { font-size: clamp(32px, 5vw, 56px); color: var(--white); margin: 0 0 18px; font-family: 'Nunito', sans-serif; font-weight: 900; }
.hero h1 em { color: var(--gold); font-style: italic; }
.hero p { font-size: 16px; opacity: .85; max-width: 460px; margin: 0 0 32px; line-height: 1.6; }
.hero-stats { display: flex; gap: 0; margin-top: 8px; border-top: 1px solid rgba(255,255,255,0.15); padding-top: 22px; }
.hero-stat { padding-right: 28px; margin-right: 28px; border-right: 1px solid rgba(255,255,255,0.15); }
.hero-stat:last-child { border-right: none; }
.hero-stat strong { font-family: 'Nunito', sans-serif; font-size: 28px; color: var(--gold); display: block; font-weight: 900; }
.hero-stat span { font-size: 11.5px; opacity: .7; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.03em; }
.hero-panel {
  position: relative; display: flex; align-items: center; justify-content: center;
  border-left: 1px solid rgba(255,255,255,0.1);
}
.hero-panel .stamp-mark {
  width: 160px; height: 160px;
  background: linear-gradient(135deg, rgba(255,179,0,0.15), rgba(255,179,0,0.05));
  border: 2.5px solid var(--gold); border-radius: 50%;
  display: flex; align-items: center; justify-content: center; flex-direction: column;
  animation: float 4s ease-in-out infinite; color: var(--gold); font-family: 'JetBrains Mono', monospace;
  text-align: center; box-shadow: 0 0 40px rgba(255,179,0,0.2), inset 0 0 30px rgba(255,179,0,0.05);
}
.hero-panel .stamp-mark strong { font-size: 24px; font-family: 'Nunito', sans-serif; font-weight: 900; display: block; color: var(--white); }
.hero-panel .stamp-mark span { font-size: 9px; letter-spacing: 0.12em; color: rgba(255,255,255,0.75); }
/* Orbiting emoji decorations */
.hero-panel .orb1, .hero-panel .orb2, .hero-panel .orb3 {
  position: absolute; font-size: 28px; animation: float 3s ease-in-out infinite;
}
.hero-panel .orb1 { top: 20%; left: 15%; animation-delay: 0s; }
.hero-panel .orb2 { top: 65%; left: 65%; animation-delay: 1s; }
.hero-panel .orb3 { top: 20%; left: 65%; animation-delay: 2s; }
@media (max-width: 760px) {
  .hero-inner { grid-template-columns: 1fr; min-height: 0; }
  .hero-panel { display: none; }
  .hero-copy { padding: 40px 20px 36px; }
}

/* ---------- Sections ---------- */
.section { padding: 44px 0; }
.section-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 22px; gap: 12px; }
.section-head h2 { font-size: 24px; color: var(--ink); display: flex; align-items: center; gap: 10px; font-family: 'Nunito', sans-serif; font-weight: 900; }
.section-head h2 .tag {
  font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--white);
  background: linear-gradient(135deg, var(--stamp), var(--pink));
  padding: 3px 9px; border-radius: 50px; font-weight: 700; letter-spacing: 0.02em;
  box-shadow: 0 2px 8px rgba(255,87,34,0.3);
}
.section-head a { color: var(--moss-dark); font-weight: 700; font-size: 13.5px; }
.section-head a:hover { text-decoration: underline; }

/* ---------- Category grid ---------- */
.cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 14px; }
.cat-card {
  background: var(--white); border: 1.5px solid var(--line); border-radius: 20px; padding: 20px 10px;
  text-align: center; transition: transform .2s ease, box-shadow .2s ease, border-color .2s; position: relative;
  cursor: pointer;
}
.cat-card:hover {
  transform: translateY(-5px) scale(1.02);
  box-shadow: var(--shadow-md); border-color: var(--moss);
}
.cat-card:hover .icon { animation: wiggle 0.4s ease; }
.cat-card .icon { font-size: 32px; display: block; margin-bottom: 10px; transition: transform .2s; }
.cat-card .name { font-size: 12px; font-weight: 800; color: var(--ink); letter-spacing: -0.01em; }

/* ---------- Product grid & card ---------- */
.product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 18px; }
.product-card {
  background: var(--white); border: 1.5px solid var(--line); border-radius: 20px; overflow: hidden;
  display: flex; flex-direction: column; position: relative;
  transition: transform .2s ease, box-shadow .2s ease, border-color .2s;
}
.product-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-md); border-color: var(--moss);
}
.product-card img {
  width: 100%; aspect-ratio: 1/1; object-fit: contain;
  background: linear-gradient(135deg, var(--paper), var(--paper-deep));
  border-bottom: 1px solid var(--line); padding: 12px;
  transition: transform .3s ease;
}
.product-card:hover img { transform: scale(1.06); }
.product-body { padding: 14px; display: flex; flex-direction: column; gap: 5px; flex: 1; }
.product-brand { font-size: 10px; color: var(--moss-dark); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
.product-name { font-size: 14px; font-weight: 700; line-height: 1.3; font-family: 'Nunito', sans-serif; color: var(--ink); }
.product-unit { font-size: 11.5px; color: var(--ink-soft); font-family: 'JetBrains Mono', monospace; }
.product-rating {
  display: inline-flex; align-items: center; gap: 4px;
  background: linear-gradient(135deg, var(--moss), var(--moss-dark));
  color: var(--white); font-size: 10.5px; font-weight: 700; padding: 3px 8px;
  border-radius: 50px; width: fit-content;
}

/* Signature element: vibrant price tag */
.price-tag { display: flex; align-items: baseline; gap: 8px; margin-top: auto; position: relative; flex-wrap: wrap; }
.price-now {
  font-family: 'Nunito', sans-serif; font-size: 20px; font-weight: 900; color: var(--stamp);
  display: inline-block;
}
.price-now::before { content: '₹'; font-size: 0.72em; margin-right: 1px; opacity: 0.85; }
.price-mrp { font-size: 11.5px; color: var(--ink-soft); text-decoration: line-through; font-family: 'JetBrains Mono', monospace; }
.price-off {
  font-size: 10px; color: var(--white); font-weight: 800;
  background: linear-gradient(135deg, var(--moss), var(--teal));
  padding: 2px 8px; border-radius: 50px;
}

.add-btn {
  background: linear-gradient(135deg, var(--moss), var(--moss-dark));
  border: none; color: var(--white); font-weight: 800; font-size: 12.5px;
  padding: 10px 10px; border-radius: 12px; width: 100%; margin-top: 10px;
  transition: transform .15s ease, box-shadow .15s ease, opacity .15s;
  box-shadow: 0 3px 12px rgba(46,204,113,0.35);
}
.add-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(46,204,113,0.45); }
.add-btn:active { transform: translateY(0); }
.add-btn:disabled { opacity: .4; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
.qty-stepper {
  display: flex; align-items: center; justify-content: space-between;
  background: linear-gradient(135deg, var(--moss), var(--moss-dark));
  border-radius: 12px; width: 100%; margin-top: 10px; overflow: hidden;
}
.qty-stepper button { background: none; border: none; color: var(--white); font-weight: 900; font-size: 18px; padding: 7px 16px; }
.qty-stepper button:hover { background: rgba(0,0,0,0.12); }
.qty-stepper span { color: var(--white); font-weight: 800; font-size: 14px; }
.stock-badge {
  position: absolute; top: 10px; left: 10px;
  background: linear-gradient(135deg, var(--stamp), var(--pink));
  color: var(--white); font-size: 9.5px;
  font-weight: 800; padding: 4px 9px; border-radius: 50px; z-index: 2;
  letter-spacing: 0.03em; box-shadow: 0 2px 8px rgba(255,87,34,0.4);
}

/* ---------- Buttons ---------- */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px; border: none;
  border-radius: 50px; font-weight: 800; font-size: 14px; padding: 13px 28px;
  transition: transform .15s ease, box-shadow .15s ease, opacity .15s;
}
.btn-primary {
  background: linear-gradient(135deg, var(--stamp), var(--pink)); color: var(--white);
  box-shadow: 0 4px 16px rgba(255,87,34,0.35);
}
.btn-primary:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(255,87,34,0.45); }
.btn-secondary {
  background: linear-gradient(135deg, var(--ink), #2D5A36); color: var(--white);
  box-shadow: 0 4px 16px rgba(26,46,29,0.25);
}
.btn-secondary:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(26,46,29,0.35); }
.btn-outline {
  background: transparent; border: 2px solid var(--moss); color: var(--moss-dark);
}
.btn-outline:hover { background: var(--moss); color: var(--white); transform: translateY(-2px); }
.btn:disabled { opacity: .45; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

/* ---------- Footer ---------- */
.footer {
  background: linear-gradient(135deg, #0A3D1F 0%, #1A6B38 100%);
  color: var(--white); padding: 52px 0 24px; margin-top: 40px;
  border-top: none; position: relative; overflow: hidden;
}
.footer::before {
  content: ''; position: absolute; inset: 0;
  background-image: radial-gradient(circle at 90% 50%, rgba(0,188,212,0.08), transparent 60%);
  pointer-events: none;
}
.footer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 28px; margin-bottom: 36px; position: relative; }
.footer-grid h4 {
  font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--gold); margin-bottom: 14px;
  font-weight: 800;
}
.footer-grid a, .footer-grid p { display: block; font-size: 13.5px; color: rgba(255,255,255,0.78); margin-bottom: 9px; transition: color .15s; }
.footer-grid a:hover { color: var(--white); padding-left: 4px; }
.footer-bottom {
  border-top: 1px solid rgba(255,255,255,.12); padding-top: 20px; font-size: 11.5px;
  opacity: .55; text-align: center; position: relative;
}

/* ---------- Forms ---------- */
.form-card { background: var(--white); border-radius: 24px; border: 1.5px solid var(--line); padding: 36px; max-width: 420px; margin: 44px auto; box-shadow: var(--shadow-md); }
.form-card h2 { color: var(--ink); margin-bottom: 6px; font-size: 26px; font-family: 'Nunito', sans-serif; font-weight: 900; }
.form-card .sub { color: var(--ink-soft); font-size: 13.5px; margin-bottom: 24px; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 6px; letter-spacing: 0.03em; color: var(--ink-soft); }
.field input, .field select, .field textarea {
  width: 100%; padding: 12px 16px; border: 1.5px solid var(--line); border-radius: 12px; font-size: 14px;
  font-family: 'Plus Jakarta Sans', sans-serif; background: var(--paper); transition: border-color .18s, box-shadow .18s;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--moss); outline: none; box-shadow: 0 0 0 4px rgba(46,204,113,0.12);
}
.form-error { background: #FFF0EE; color: var(--stamp-dark); border: 1.5px solid rgba(255,87,34,0.3); padding: 12px 16px; border-radius: 12px; font-size: 13px; margin-bottom: 16px; }
.form-success { background: #F0FDF4; color: var(--moss-dark); border: 1.5px solid rgba(46,204,113,0.3); padding: 12px 16px; border-radius: 12px; font-size: 13px; margin-bottom: 16px; }
.form-switch { text-align: center; margin-top: 18px; font-size: 13px; color: var(--ink-soft); }
.form-switch button { background: none; border: none; color: var(--moss-dark); font-weight: 800; }

/* ---------- Page header ---------- */
.page-head { padding: 30px 0 10px; }
.page-head h1 { font-size: 28px; color: var(--ink); font-family: 'Nunito', sans-serif; font-weight: 900; }
.breadcrumb { font-size: 12.5px; color: var(--ink-soft); margin-bottom: 10px; font-family: 'JetBrains Mono', monospace; }
.breadcrumb a:hover { color: var(--moss-dark); }

/* ---------- Cart page ---------- */
.cart-layout { display: grid; grid-template-columns: 1fr 350px; gap: 24px; align-items: start; }
@media (max-width: 800px) { .cart-layout { grid-template-columns: 1fr; } }
.cart-line {
  display: flex; gap: 16px; background: var(--white); border: 1.5px solid var(--line); border-radius: 18px;
  padding: 16px; margin-bottom: 12px; align-items: center; transition: box-shadow .2s;
}
.cart-line:hover { box-shadow: var(--shadow-sm); }
.cart-line img { width: 68px; height: 68px; object-fit: cover; border-radius: 12px; background: var(--paper-deep); border: 1px solid var(--line); }
.cart-line-info { flex: 1; }
.cart-line-info .name { font-weight: 700; font-size: 14px; font-family: 'Nunito', sans-serif; }
.cart-line-info .unit { font-size: 11.5px; color: var(--ink-soft); font-family: 'JetBrains Mono', monospace; }
.cart-line-price { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 17px; color: var(--stamp); min-width: 68px; text-align: right; }
.remove-link { background: none; border: none; color: var(--ink-soft); font-size: 11.5px; text-decoration: underline; margin-top: 4px; }
.remove-link:hover { color: var(--stamp); }

.summary-card { background: var(--white); border: 1.5px solid var(--line); border-radius: 22px; padding: 22px; box-shadow: var(--shadow-sm); }

<script>
/* ---------------- Supabase setup ---------------- */

const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFvbW1ieXR0aXFueWp4YmV5amlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NzMzNDYsImV4cCI6MjA5ODE0OTM0Nn0.Ndh9LBa5oBUzTTDRxf-Ldkcb7J0a9L_m5Yfdm76mceM';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ---- Cloudinary (direct unsigned upload — see uploadFileToCloudinary below) ----
   SECURITY: The upload preset must be "unsigned" and should be restricted in the
   Cloudinary dashboard to allowed file types (image only) and a max file size.
   Anyone who discovers these values can upload to this account — tighten the
   preset's allowed origins/referrers in Cloudinary settings if this is production. */
const CLOUDINARY_CLOUD_NAME = 'dtkmcauam';
const CLOUDINARY_UPLOAD_PRESET = 'shivganga_unsigned';

/* ---------------- App state ---------------- */
let state = {
  route: { name: 'home' },
  user: null,
  profile: null,
  categories: [],
  cartItems: [],   // [{id, quantity, product}]
  toast: '',
  guestCart: [],   // Fix #18: [{productId, quantity, product}] for logged-out users
};

/* Fix #18: Guest cart helpers using localStorage */
const GUEST_CART_KEY = 'jjmart_guest_cart';
function loadGuestCart() {
  try {
    const raw = localStorage.getItem(GUEST_CART_KEY);
    state.guestCart = raw ? JSON.parse(raw) : [];
  } catch { state.guestCart = []; }
}
function saveGuestCart() {
  try { localStorage.setItem(GUEST_CART_KEY, JSON.stringify(state.guestCart)); } catch {}
}
async function mergeGuestCartOnLogin() {
  if (!state.user || state.guestCart.length === 0) return;
  for (const item of state.guestCart) {
    const existing = state.cartItems.find(i => i.product.id === item.productId);
    if (existing) {
      const newQty = existing.quantity + item.quantity;
      await sb.from('cart_items').update({ quantity: newQty }).eq('id', existing.id);
    } else {
      await sb.from('cart_items').insert({ user_id: state.user.id, product_id: item.productId, quantity: item.quantity });
    }
  }
  state.guestCart = [];
  saveGuestCart();
  await loadCart();
}

function setState(patch) {
  state = { ...state, ...patch };
  render();
}

/* Fix #9: Debounce helper for live search */
function debounce(fn, delay) {
  let timer;
  return function (...args) {
    clearTimeout(timer);
    timer = setTimeout(() => fn.apply(this, args), delay);
  };
}
let _searchInFlight = false; // Fix #14: track in-flight search to prevent duplicates
const debouncedLiveSearch = debounce(function (q) {
  if (q && q.trim().length >= 2) go({ name: 'search', q: q.trim() });
}, 350);

function go(route, opts = {}) {
  // Fix #17: save scroll position of current page before navigating away
  const currentKey = JSON.stringify(state.route);
  sessionStorage.setItem('scroll:' + currentKey, String(window.scrollY));

  setState({ route });
  window.scrollTo(0, 0);
  if (opts.replace) {
    history.replaceState({ route }, '', '#' + encodeURIComponent(JSON.stringify(route)));
  } else {
    history.pushState({ route }, '', '#' + encodeURIComponent(JSON.stringify(route)));
  }
}

// Browser back/forward should move through app pages, not exit the site.
window.addEventListener('popstate', (e) => {
  const route = e.state?.route || { name: 'home' };
  setState({ route });
  // Fix #17: restore scroll position when navigating back/forward
  const savedScroll = sessionStorage.getItem('scroll:' + JSON.stringify(route));
  if (savedScroll) {
    requestAnimationFrame(() => window.scrollTo(0, parseInt(savedScroll, 10)));
  } else {
    window.scrollTo(0, 0);
  }
});

function showToast(msg) {
  setState({ toast: msg });
  setTimeout(() => setState({ toast: '' }), 2500);
}

/* ---------------- Data loaders ---------------- */
async function loadCategories() {
  const { data } = await sb.from('categories').select('*').order('sort_order');
  setState({ categories: data || [] });
}

async function loadSettings() {
  const { data } = await sb.from('site_settings').select('*');
  const settings = {};
  (data || []).forEach(row => { settings[row.key] = row.value; });
  state.settings = settings;
  applySettingsToPage();
}

function applySettingsToPage() {
  const s = state.settings || {};
  if (s.color_green) document.documentElement.style.setProperty('--moss', s.color_green);

/* =========================================================
   STORE HOURS: open 8:00 AM – 10:00 PM IST
   ========================================================= */
const STORE_OPEN_HOUR  = 8;   // 8:00 AM
const STORE_CLOSE_HOUR = 22;  // 10:00 PM

function getISTHour() {
  // IST = UTC+5:30
  const now = new Date();
  const utcMs = now.getTime() + now.getTimezoneOffset() * 60000;
  const istMs = utcMs + (5.5 * 3600000);
  return new Date(istMs).getHours();
}

function isStoreOpen() {
  const h = getISTHour();
  return h >= STORE_OPEN_HOUR && h < STORE_CLOSE_HOUR;
}

function storeClosedMessage() {
  const h = getISTHour();
  if (h < STORE_OPEN_HOUR) return `We open at 8:00 AM IST. Come back soon! 🌅`;
  return `We're closed for the night. Back at 8:00 AM tomorrow! 🌙`;
}

/* =========================================================
   PINCODE RESTRICTION: Dwarka Mor + Uttam Nagar areas
   =========================================================
   Dwarka Mor    – 110059
   Uttam Nagar   – 110059, 110056, 110078
   ========================================================= */
const ALLOWED_PINCODES = {
  '110059': 'Dwarka Mor / Uttam Nagar',
  '110056': 'Uttam Nagar',
  '110078': 'Uttam Nagar (East)',
};

function isPincodeAllowed(pin) {
  return Object.prototype.hasOwnProperty.call(ALLOWED_PINCODES, String(pin).trim());
}

function pincodeAreaName(pin) {
  return ALLOWED_PINCODES[String(pin).trim()] || '';
}

window.checkPincode = function () {
  const input = document.getElementById('pincode-checker-input');
  const resultEl = document.getElementById('pincode-checker-result');
  if (!input || !resultEl) return;
  const pin = input.value.trim();
  resultEl.style.display = 'inline-block';
  if (!/^\d{6}$/.test(pin)) {
    resultEl.className = 'pincode-result fail';
    resultEl.textContent = '⚠️ Enter a valid 6-digit pincode';
    return;
  }
  if (isPincodeAllowed(pin)) {
    resultEl.className = 'pincode-result ok';
    resultEl.textContent = `✅ Great! We deliver to ${pincodeAreaName(pin)} (${pin})!`;
  } else {
    resultEl.className = 'pincode-result fail';
    resultEl.textContent = `❌ Sorry, we don't deliver to ${pin} yet. We serve Dwarka Mor & Uttam Nagar.`;
  }
};

/* ---------------- Cart actions (optimistic — UI updates instantly, DB syncs in background) ---------------- */
async function addToCart(productId, qty = 1) {
  // Block ordering outside store hours
  if (!isStoreOpen()) {
    showToast(`Store is closed. ${storeClosedMessage()}`);
    return;
  }
  // Fix #18: guest cart — allow adding without login, merge on login
  if (!state.user) {
    const product = state._knownProducts?.[productId];
    if (!product) return;
    const existing = state.guestCart.find(i => i.productId === productId);
    if (existing) {
      existing.quantity += qty;
    } else {
      state.guestCart.push({ productId, quantity: qty, product });
    }
    saveGuestCart();
    showToast('Added to cart — log in to checkout');
    patchCartUI(productId);
    return;
  }

  const existing = state.cartItems.find(i => i.product.id === productId);

  if (existing) {
    existing.quantity += qty;
    patchCartUI(productId);
    const { error } = await sb.from('cart_items').update({ quantity: existing.quantity }).eq('id', existing.id);
    if (error) { existing.quantity -= qty; patchCartUI(productId); showToast('Could not update cart — please try again.'); }
    return;
  }

  // New line: use the already-cached product so this is instant — no network round trip before the UI updates.
  const product = state._knownProducts?.[productId];
  if (!product) return;
  const tempId = 'temp-' + productId;
  // Fix #12: prevent duplicate temp entries if addToCart is called again while the insert is in-flight
  if (state.cartItems.find(i => i.id === tempId)) return;
  state.cartItems.push({ id: tempId, quantity: qty, product });
  patchCartUI(productId);

  const { data, error } = await sb.from('cart_items').insert({ user_id: state.user.id, product_id: productId, quantity: qty }).select('id').single();
  if (error) {
    state.cartItems = state.cartItems.filter(i => i.id !== tempId);
    patchCartUI(productId);
    showToast('Could not add to cart — please try again.');
    return;
  }
  const line = state.cartItems.find(i => i.id === tempId);
  if (line) line.id = data.id;
}

async function updateQty(cartItemId, qty) {
  const line = state.cartItems.find(i => i.id === cartItemId);
  if (!line) return;
  const prevQty = line.quantity;
  const productId = line.product.id;

  if (qty <= 0) {
    state.cartItems = state.cartItems.filter(i => i.id !== cartItemId);
    patchCartUI(productId);
    const { error } = await sb.from('cart_items').delete().eq('id', cartItemId);
    if (error) { state.cartItems.push(line); patchCartUI(productId); showToast('Could not remove item — please try again.'); }
    return;
  }

  line.quantity = qty;
  patchCartUI(productId);
  const { error } = await sb.from('cart_items').update({ quantity: qty }).eq('id', cartItemId);
  if (error) { line.quantity = prevQty; patchCartUI(productId); showToast('Could not update quantity — please try again.'); }
}

async function removeItem(cartItemId) {
  const idx = state.cartItems.findIndex(i => i.id === cartItemId);
  if (idx === -1) return;
  const [removed] = state.cartItems.splice(idx, 1);
  patchCartUI(removed.product.id);
  const { error } = await sb.from('cart_items').delete().eq('id', cartItemId);
  if (error) { state.cartItems.splice(idx, 0, removed); patchCartUI(removed.product.id); showToast('Could not remove item — please try again.'); }
}

function cartCount() {
  if (!state.user) return state.guestCart.reduce((s, i) => s + i.quantity, 0);
  return state.cartItems.reduce((s, i) => s + i.quantity, 0);
}

function cartSubtotal() {
  if (!state.user) return state.guestCart.reduce((s, i) => s + i.quantity * Number(i.product.price), 0);
  return state.cartItems.reduce((s, i) => s + i.quantity * Number(i.product.price), 0);
}

/* Lightweight UI patch used by cart actions: updates the header cart badge
   and any visible product card(s) for the affected product, without
   re-fetching data or rebuilding the whole page. Falls back to a full
   render() only on pages that don't use product cards (cart/checkout). */
function patchCartUI(productId) {
  const badge = document.querySelector('.header-actions .cart-badge');
  const count = cartCount();
  const cartLink = document.querySelector('.header-actions a[onclick*="cart"]');
  if (cartLink) {
    cartLink.innerHTML = `🛒 Cart ${count > 0 ? `<span class="cart-badge">${count}</span>` : ''}`;
  }

  if (state.route.name === 'cart' || state.route.name === 'checkout') {
    // These pages render cart lines directly; just re-render the page (cheap, no network call).
    render();
    return;
  }

  if (productId) {
    const product =
      state.cartItems.find(i => i.product.id === productId)?.product ||
      state._knownProducts?.[productId];
    if (product) {
      document.querySelectorAll(`[data-action-for="${productId}"]`).forEach(slot => {
        slot.innerHTML = productActionHTML(product);
      });
      document.querySelectorAll(`.product-card[data-product-id="${productId}"] .stock-badge`).forEach(b => b.remove());
    }
  }
}
/* ---------------- Helpers ---------------- */
function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

// A clean inline placeholder (no network request, so it can never itself fail to load)
// shown whenever a product's actual image URL is missing or fails to load for any reason.
const NO_IMAGE_PLACEHOLDER = 'data:image/svg+xml;utf8,' + encodeURIComponent(
  `<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
     <rect width="400" height="400" fill="#E8DFC9"/>
     <text x="50%" y="46%" font-family="monospace" font-size="34" text-anchor="middle" fill="#4A4337">🛒</text>
     <text x="50%" y="62%" font-family="monospace" font-size="13" text-anchor="middle" fill="#8A8276">no photo yet</text>
   </svg>`
);

// Use as: <img src="${imgSrc(p.image_url)}" onerror="${imgOnError()}">
function imgSrc(url) {
  return url ? esc(url) : NO_IMAGE_PLACEHOLDER;
}
function imgOnError() {
  // Swap to the placeholder and remove the handler so a second failure can't loop.
  return `this.onerror=null;this.src='${NO_IMAGE_PLACEHOLDER}';`;
}

function productActionHTML(p) {
  if (p.stock === 0) {
    return `<button class="add-btn" disabled>Out of stock</button>`;
  }
  // Bug 8 fix: reflect both logged-in cart AND guest cart on product cards
  const line = state.cartItems.find(i => i.product.id === p.id);
  if (line) {
    return `
      <div class="qty-stepper">
        <button onclick="updateQty('${line.id}', ${line.quantity - 1})">−</button>
        <span>${line.quantity}</span>
        <button onclick="updateQty('${line.id}', ${line.quantity + 1})">+</button>
      </div>`;
  }
  const guestLine = state.guestCart.find(i => i.productId === p.id);
  if (guestLine) {
    return `
      <div class="qty-stepper">
        <button onclick="updateGuestQty('${p.id}', ${guestLine.quantity - 1})">−</button>
        <span>${guestLine.quantity}</span>
        <button onclick="updateGuestQty('${p.id}', ${guestLine.quantity + 1})">+</button>
      </div>`;
  }
  return `<button class="add-btn" onclick="addToCart('${p.id}')">ADD</button>`;
}

function productCardHTML(p) {
  state._knownProducts = state._knownProducts || {};
  state._knownProducts[p.id] = p;
  const off = p.mrp > p.price ? Math.round((p.mrp - p.price) / p.mrp * 100) : 0;
  return `
    <div class="product-card" data-product-id="${p.id}">
      ${p.stock > 0 && p.stock <= 5 ? `<span class="stock-badge">Only ${p.stock} left</span>` : ''}
      ${p.stock === 0 ? `<span class="stock-badge" style="background:#8A8276">Out of stock</span>` : ''}
      <a onclick="go({name:'product', slug:'${p.slug}'})"><img src="${imgSrc(p.image_url)}" alt="${esc(p.name)}" loading="lazy" onerror="${imgOnError()}"></a>
      <div class="product-body">
        <span class="product-brand">${esc(p.brand || '')}</span>
        <a onclick="go({name:'product', slug:'${p.slug}'})"><div class="product-name">${esc(p.name)}</div></a>
        <span class="product-unit">${esc(p.unit)}</span>
        ${p.rating > 0 ? `<span class="product-rating">★ ${p.rating} (${p.rating_count})</span>` : ''}
        <div class="price-tag">
          <span class="price-now">₹${p.price}</span>
          ${off > 0 ? `<span class="price-mrp">₹${p.mrp}</span><span class="price-off">${off}% OFF</span>` : ''}
        </div>
        <span class="product-action-slot" data-action-for="${p.id}">${productActionHTML(p)}</span>
      </div>
    </div>`;
}

function sortProducts(list, sort) {
  const arr = [...list];
  if (sort === 'price_low') arr.sort((a, b) => a.price - b.price);
  else if (sort === 'price_high') arr.sort((a, b) => b.price - a.price);
  else if (sort === 'rating') arr.sort((a, b) => b.rating - a.rating);
  else arr.sort((a, b) => b.rating_count - a.rating_count);
  return arr;
}

function renderCategoryList(root, cat) {
  const sorted = sortProducts(state._catProducts, state._sort);
  const sorts = [['popular', 'Popularity'], ['price_low', 'Price: Low to High'], ['price_high', 'Price: High to Low'], ['rating', 'Rating']];

// Bug 6: review star selector
window.setReviewStar = function (productId, n) {
  document.getElementById('review-star-' + productId).value = n;
  document.querySelectorAll('#star-row-' + productId + ' button').forEach(btn => {
    btn.style.opacity = Number(btn.dataset.star) <= n ? '1' : '.35';

};

// Bug 6: review submit handler
window.submitReview = async function (productId) {
  const rating = Number(document.getElementById('review-star-' + productId).value);
  const comment = (document.getElementById('review-comment-' + productId).value || '').trim();
  const errEl = document.getElementById('review-err-' + productId);
  if (rating === 0) { errEl.textContent = 'Please select a star rating.'; return; }
  errEl.textContent = '';
  const { error } = await sb.from('reviews').upsert({ product_id: productId, user_id: state.user.id, rating, comment }, { onConflict: 'product_id,user_id' });
  if (error) { errEl.textContent = 'Could not submit review: ' + error.message; return; }
  showToast('Review submitted! Thank you.');

};

};

/* ── Feature 3: Coupon / promo code ── */
window.applyCoupon = async function () {
  const code = (document.getElementById('coupon-input')?.value || '').trim().toUpperCase();
  const root = document.getElementById('main-content');
  if (!code) { state._couponMsg = 'Please enter a promo code.'; state._couponCode = ''; state._couponDiscount = 0; if(root) renderCheckoutView(root); return; }

  const { data: coupon, error } = await sb.from('coupons')
    .select('*').eq('code', code).eq('is_active', true).single();

  if (error || !coupon) {
    state._couponCode = code; state._couponDiscount = 0;
    state._couponMsg = '❌ Invalid or expired promo code.';
    if(root) renderCheckoutView(root); return;
  }

  // Minimum order check
  const subtotal = cartSubtotal();
  if (coupon.min_order_value && subtotal < coupon.min_order_value) {
    state._couponCode = code; state._couponDiscount = 0;
    state._couponMsg = `⚠ Minimum order ₹${coupon.min_order_value} required for this code.`;
    if(root) renderCheckoutView(root); return;
  }

  // Compute discount
  let discount = 0;
  if (coupon.discount_type === 'percent') {
    discount = subtotal * coupon.discount_value / 100;
    if (coupon.max_discount) discount = Math.min(discount, coupon.max_discount);
  } else {
    discount = coupon.discount_value;
  }
  discount = Math.min(discount, subtotal); // never exceed subtotal

  state._couponCode = code;
  state._couponDiscount = discount;
  state._couponMsg = `✅ "${code}" applied — you save ₹${discount.toFixed(0)}!`;
  if(root) renderCheckoutView(root);
};

  state._showAddrForm = show;
  // Fix #3: Use the dedicated main-content element instead of fragile DOM traversal
  const root = document.getElementById('main-content');
  if (root) renderCheckoutView(root);
};
window.setPayment = function (val) { state._paymentMethod = val; };

window.saveAddress = async function (e) {
  e.preventDefault();
  const form = {
    full_name: document.getElementById('af_name').value,
    phone: document.getElementById('af_phone').value,
    line1: document.getElementById('af_line1').value,
    line2: document.getElementById('af_line2').value,
    city: document.getElementById('af_city').value,
    state: document.getElementById('af_state').value,
    pincode: document.getElementById('af_pincode').value,
  };
  if (!form.full_name || !form.phone || !form.line1 || !form.city || !form.state || !form.pincode) {
    state._checkoutError = 'Please fill in all required fields.';
    render();
    return;
  }
  // Fix #11: validate phone (10 digits) and pincode (6 digits)
  if (!/^\d{10}$/.test(form.phone.replace(/\s+/g, ''))) {
    state._checkoutError = 'Please enter a valid 10-digit phone number.';
    render();
    return;
  }
  if (!/^\d{6}$/.test(form.pincode.trim())) {
    state._checkoutError = 'Please enter a valid 6-digit pincode.';
    render();
    return;
  }
  // Delivery area restriction
  if (!isPincodeAllowed(form.pincode)) {
    state._checkoutError = `🚫 We only deliver to Dwarka Mor & Uttam Nagar. Allowed pincodes: 110059, 110056, 110078. Please use a different address.`;
    const root = document.getElementById('main-content');
    if (root) renderCheckoutView(root); else render();
    return;
  }
  const { data, error } = await sb.from('addresses').insert({ ...form, user_id: state.user.id, is_default: state._addresses.length === 0 }).select().single();
  if (error) { state._checkoutError = error.message; render(); return; }
  state._addresses.push(data);
  state._selectedAddr = data.id;
  state._showAddrForm = false;
  state._checkoutError = '';
  render();
};

window.placeOrder = async function () {
  state._checkoutError = '';

  // Store hours check
  if (!isStoreOpen()) {
    state._checkoutError = `🕙 Store is currently closed. ${storeClosedMessage()} (Open 8 AM – 10 PM IST)`;
    render();
    return;
  }

  if (!state._selectedAddr) { state._checkoutError = 'Please select or add a delivery address.'; render(); return; }

  // Pincode restriction check
  const addr = state._addresses.find(a => a.id === state._selectedAddr);
  if (!isPincodeAllowed(addr.pincode)) {
    state._checkoutError = `🚫 Sorry! We currently deliver only to Dwarka Mor & Uttam Nagar (pincodes: 110059, 110056, 110078). Your address pincode (${addr.pincode}) is outside our delivery area.`;
    render();
    return;
  }

  const btn = document.getElementById('place-order-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Placing order…'; }

  const addressText = `${addr.line1}${addr.line2 ? ', ' + addr.line2 : ''}, ${addr.city}, ${addr.state} - ${addr.pincode}`;

  // Fix #2: Check stock for each item sequentially so we get a deterministic
  // first-failure message. Still not a DB-level transaction — for true atomicity
  // this should call a Postgres RPC with FOR UPDATE row locks. This client-side
  // check is a best-effort guard against obvious oversells.
  for (const line of state.cartItems) {
    const { data: fresh } = await sb.from('products').select('stock').eq('id', line.product.id).single();
    if (!fresh || fresh.stock < line.quantity) {
      state._checkoutError = `Sorry, "${line.product.name}" doesn't have enough stock. Please update your cart.`;
      // Fix #6: re-enable the button on stock-check failure so user can retry
      if (btn) { btn.disabled = false; btn.textContent = `Place Order — ₹${(cartSubtotal() + (cartSubtotal() >= getFreeDeliveryThreshold() ? 0 : getDeliveryFee())).toFixed(0)}`; }
      render();
      return;
    }
  }

  const subtotal = cartSubtotal();
  const freeThreshold = getFreeDeliveryThreshold();
  const deliveryFee = subtotal >= freeThreshold ? 0 : getDeliveryFee();
  // Feature 3: apply coupon discount to final total
  const couponDiscount = state._couponDiscount || 0;
  const total = Math.max(0, subtotal + deliveryFee - couponDiscount);

  const { data: order, error: orderErr } = await sb.from('orders').insert({
    user_id: state.user.id, address_id: state._selectedAddr, status: 'placed',
    payment_method: state._paymentMethod, payment_status: state._paymentMethod === 'cod' ? 'pending' : 'paid',
    subtotal, delivery_fee: deliveryFee, total,
    delivery_name: addr.full_name, delivery_phone: addr.phone, delivery_address: addressText
  }).select().single();

  if (orderErr) { state._checkoutError = orderErr.message; render(); return; }

  const orderItems = state.cartItems.map(line => ({
    order_id: order.id, product_id: line.product.id, product_name: line.product.name,
    unit: line.product.unit, price: line.product.price, quantity: line.quantity
  }));
  await sb.from('order_items').insert(orderItems);

  for (const line of state.cartItems) {
    await sb.from('products').update({ stock: line.product.stock - line.quantity }).eq('id', line.product.id);
  }

  await sb.from('cart_items').delete().eq('user_id', state.user.id);
  await loadCart();
  go({ name: 'orders', placed: order.id }, { replace: true });
};


/* ── Feature 2: Order tracking timeline ── */
function orderTimelineHTML(status) {
  if (status === 'cancelled') {
    return `<div class="order-timeline">
      <div class="ot-step cancelled"><div class="ot-dot">✕</div><div class="ot-label">Cancelled</div></div>
    </div>`;
  }
  const steps = [
    { key: 'placed',    icon: '📋', label: 'Order<br>Placed' },
    { key: 'packed',    icon: '📦', label: 'Packed' },
    { key: 'shipped',   icon: '🚚', label: 'Out for<br>Delivery' },
    { key: 'delivered', icon: '✅', label: 'Delivered' },
  ];
  const order = ['placed', 'packed', 'shipped', 'delivered'];
  const currentIdx = order.indexOf(status);
  return '<div class="order-timeline">' +
    steps.map((s, i) => {
      const cls = i < currentIdx ? 'done' : i === currentIdx ? 'active' : '';
      return `<div class="ot-step ${cls}"><div class="ot-dot">${s.icon}</div><div class="ot-label">${s.label}</div></div>`;
    }).join('') +
  '</div>';
}

window.saveProfile = async function (e) {
  e.preventDefault();
  // Bug 1 fix: use acct_name/acct_phone to avoid ID clash with admin product form
  const full_name = document.getElementById('acct_name').value;
  const phone = document.getElementById('acct_phone').value;

    document.getElementById('acct-msg').innerHTML = `<div class="form-error">Please enter a valid 10-digit phone number.</div>`;
    return;
  }
  // Fix #5: handle update errors instead of silently ignoring them
  const { error } = await sb.from('profiles').update({ full_name, phone }).eq('id', state.user.id);
  if (error) {
    document.getElementById('acct-msg').innerHTML = `<div class="form-error">Could not save profile: ${esc(error.message)}</div>`;
    return;
  }
  const { data: profile } = await sb.from('profiles').select('*').eq('id', state.user.id).single();
  state.profile = profile;
  document.getElementById('acct-msg').innerHTML = `<div class="form-success">Profile updated!</div>`;
};

async function renderSearchPage(root, q) {
  root.innerHTML = `
    <div class="container">
      <div class="page-head"><div class="breadcrumb"><a onclick="go({name:'home'})">Home</a> / Search</div><h1>Results for "${esc(q)}"</h1></div>
      <div class="spinner-wrap">Searching…</div>
    </div>`;

  const term = (q || '').trim();
  if (!term) {
    root.querySelector('.container').innerHTML = `
      <div class="page-head"><div class="breadcrumb"><a onclick="go({name:'home'})">Home</a> / Search</div><h1>Search</h1></div>
      <div class="empty-state"><span class="emoji">🔍</span><h3>Type something to search</h3></div>`;
    return;
  }

  // Fix #14: prevent concurrent search requests from racing
  if (_searchInFlight) return;
  _searchInFlight = true;

  // Fix #4: escape special SQL LIKE chars to prevent filter injection
  const safeTerm = term.replace(/[%_\\]/g, c => '\\' + c);

  const { data, error } = await sb
    .from('products')
    .select('*')
    .eq('is_active', true)
    .or(`name.ilike.%${safeTerm}%,brand.ilike.%${safeTerm}%,description.ilike.%${safeTerm}%`);

  _searchInFlight = false;

  // Guard against the user navigating away while this request was in flight.
  if (state.route.name !== 'search' || state.route.q !== q) return;

  const products = data || [];
  root.querySelector('.container').innerHTML = `
    <div class="page-head"><div class="breadcrumb"><a onclick="go({name:'home'})">Home</a> / Search</div><h1>Results for "${esc(q)}"</h1></div>
    ${error ? `<div class="form-error">Search failed: ${esc(error.message)}</div>` : ''}
    ${products.length === 0
      ? `<div class="empty-state"><span class="emoji">🔍</span><h3>No products found</h3><p>Try searching for something like "rice", "soap", or "milk".</p></div>`
      : `<div class="product-grid" style="padding-bottom:40px;">${products.map(productCardHTML).join('')}</div>`}`;
}

window.switchAuthMode = function (mode) {
  state._authMode = mode;
  state._authError = '';
  state._authInfo = '';
  render();
};

window.handleAuth = async function (e) {
  e.preventDefault();
  const email = document.getElementById('au_email').value;
  const password = document.getElementById('au_password').value;
  const btn = document.getElementById('auth-submit-btn');
  btn.disabled = true; btn.textContent = 'Please wait…';

  if (state._authMode === 'signup') {
    const full_name = document.getElementById('su_name').value;
    const phone = document.getElementById('su_phone').value;
    if (!full_name || !email || !password) {
      state._authError = 'Please fill in name, email, and password.';
      render();
      return;
    }
    const { error } = await sb.auth.signUp({ email, password, options: { data: { full_name, phone } } });
    if (error) { state._authError = error.message; render(); return; }
    state._authMode = 'login';
    state._authInfo = 'Account created! You can now log in.';
    render();
    return;
  }

  if (!email || !password) {
    state._authError = 'Please enter your email and password.';
    render();
    return;
  }
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { state._authError = error.message; render(); return; }
  await refreshSession();
  go({ name: 'home' }, { replace: true });
};

function productImagePreviewHTML(imageUrl) {
  if (imageUrl) {
    return `
      <div class="img-upload-preview">
        <img src="${esc(imageUrl)}" alt="Product image preview">
        <div class="img-upload-preview-actions">
          <button type="button" class="btn btn-outline" onclick="triggerImageUpload()">Replace image</button>
          <button type="button" class="icon-btn" onclick="removeProductImage()">Remove</button>
        </div>
      </div>
      <input type="file" id="pf-image-file-input" accept="image/png,image/jpeg,image/webp" style="display:none;" onchange="handleImageFileSelect(event)">`;
  }
  return `
    <button type="button" class="img-dropzone" onclick="triggerImageUpload()"
      ondragover="event.preventDefault();event.stopPropagation();this.classList.add('drag-over')"
      ondragleave="this.classList.remove('drag-over')"
      ondrop="handleImageDrop(event)">
      <span class="img-dropzone-icon">📷</span>
      <span class="img-dropzone-text">Drag a photo here, or click to upload</span>
      <span class="img-dropzone-sub">PNG or JPG, up to 8MB</span>
    </button>
    <input type="file" id="pf-image-file-input" accept="image/png,image/jpeg,image/webp" style="display:none;" onchange="handleImageFileSelect(event)">`;
}

window.handleImageFileSelect = function (e) {
  const file = e.target.files?.[0];
  if (!file) return;
  validateAndUploadImage(file);
  e.target.value = ''; // allow re-selecting the same file later
};

window.handleImageDrop = function (e) {
  e.preventDefault();
  e.stopPropagation();
  e.currentTarget.classList.remove('drag-over');
  const file = e.dataTransfer?.files?.[0];
  if (!file) return;
  validateAndUploadImage(file);
};

function validateAndUploadImage(file) {
  if (!/^image\/(png|jpe?g|webp)$/.test(file.type)) {
    showToast('Please choose a PNG, JPG, or WEBP image.');
    return;
  }
  if (file.size > 8000000) {
    showToast('Image is too large — please use a file under 8MB.');
    return;
  }
  uploadFileToCloudinary(file);
}

async function uploadFileToCloudinary(file) {
  const wrap = document.getElementById('pf-image-preview-wrap');
  if (wrap) wrap.innerHTML = `<div class="img-dropzone" style="cursor:default;"><span class="img-dropzone-icon">⏳</span><span class="img-dropzone-text">Uploading…</span></div>`;

  const formData = new FormData();
  formData.append('file', file);
  formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
  formData.append('folder', 'jjmart_products');

  try {
    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, {
      method: 'POST', body: formData,
    });
    const data = await res.json();
    if (!res.ok || !data.secure_url) {
      throw new Error(data.error?.message || 'Upload failed');
    }
    document.getElementById('pf_image').value = data.secure_url;
    if (wrap) wrap.innerHTML = productImagePreviewHTML(data.secure_url);
    showToast('Image uploaded');
  } catch (err) {
    if (wrap) wrap.innerHTML = productImagePreviewHTML('');
    showToast('Upload failed: ' + (err.message || 'please try again'));
  }
}

window.saveProduct = async function () {
  const name = document.getElementById('pf_name').value.trim();
  const mrp = Number(document.getElementById('pf_mrp').value);
  const price = Number(document.getElementById('pf_price').value);
  const stock = Number(document.getElementById('pf_stock').value);
  const errBox = document.getElementById('product-form-error');

  if (!name || !mrp || !price || stock === '' || isNaN(stock)) {
    errBox.innerHTML = `<div class="form-error">Please fill in Name, MRP, Price, and Stock.</div>`;
    return;
  }

  const payload = {
    name,
    slug: document.getElementById('pf_slug').value.trim() || slugify(name),
    category_id: document.getElementById('pf_category').value || null,
    brand: document.getElementById('pf_brand').value.trim(),
    unit: document.getElementById('pf_unit').value.trim() || '1 pc',
    mrp, price, stock,
    image_url: document.getElementById('pf_image').value.trim(),
    description: document.getElementById('pf_desc').value.trim(),
    size_options: (state._admin.productForm.size_options || [])
      .filter(v => v.label && v.label.trim())
      .map(v => ({ label: v.label.trim(), mrp: Number(v.mrp) || 0, price: Number(v.price) || 0, stock: Number(v.stock) || 0 })),
  };

  const editingId = state._admin.editingProduct;
  const { error } = editingId === 'new'
    ? await sb.from('products').insert(payload)
    : await sb.from('products').update(payload).eq('id', editingId);

  if (error) {
    errBox.innerHTML = `<div class="form-error">${esc(error.message)}</div>`;
    return;
  }

  closeAdminModal();
  showToast(editingId === 'new' ? 'Product added!' : 'Product updated!');
  await refreshAdminTab('products');
};

window.toggleProductActive = async function (id) {
  const p = state._admin.products.find(p => p.id === id);
  if (!p) return;
  await sb.from('products').update({ is_active: !p.is_active }).eq('id', id);
  await refreshAdminTab('products');
};

  await sb.from('products').delete().eq('id', id);

window.saveSiteSettings = async function () {
  const updates = [
    ['store_name', document.getElementById('set_store_name').value.trim() || 'JJ Mart'],
    ['tagline', document.getElementById('set_tagline').value.trim()],
    ['support_email', document.getElementById('set_support_email').value.trim()],
    ['support_hours', document.getElementById('set_support_hours').value.trim()],
    ['free_delivery_threshold', String(Number(document.getElementById('set_free_threshold').value) || 299)],
    ['delivery_fee', String(Number(document.getElementById('set_delivery_fee').value) || 0)],
    ['color_green', document.getElementById('set_color_green').value],
    ['color_orange', document.getElementById('set_color_orange').value],
    ['color_cream', document.getElementById('set_color_cream').value],
  ];

  const msgBox = document.getElementById('settings-save-msg');
  for (const [key, value] of updates) {
    const { error } = await sb.from('site_settings').upsert({ key, value, updated_at: new Date().toISOString() });
    if (error) {
      msgBox.innerHTML = `<div class="form-error">Failed to save "${key}": ${esc(error.message)}</div>`;
      return;
    }
  }

  await loadSettings();
  msgBox.innerHTML = `<div class="form-success">All settings saved! Changes are live across the site now.</div>`;
  showToast('Site settings updated');
};

/* Refresh just the data behind one admin tab, without leaving the admin page or doing a full app re-render. */
async function refreshAdminTab(which) {
  if (which === 'products') {
    const { data } = await sb.from('products').select('*, category:categories(name)').order('created_at', { ascending: false });
    state._admin.products = data || [];
  } else if (which === 'categories') {
    const { data } = await sb.from('categories').select('*').order('sort_order');
    state._admin.categories = data || [];
  } else if (which === 'orders') {
    const { data } = await sb.from('orders').select('*, items:order_items(*)').order('created_at', { ascending: false });
    state._admin.orders = data || [];
  }
  renderAdminTabContent();
}

}

// The login prompt is a transient overlay, not a navigable page — it never
// participates in routing. While it's open, a single back-button press
// closes it (via a one-time popstate listener) instead of leaving the app.
function showLoginPrompt() {
  state.showLoginPrompt = true;
  render();
  history.pushState({ loginPrompt: true, route: state.route }, '', location.hash);
  window.addEventListener('popstate', closeLoginPromptFromBack, { once: true });
}

function closeLoginPromptFromBack() {
  state.showLoginPrompt = false;
  render();
}

window.closeLoginPrompt = function () {
  if (!state.showLoginPrompt) return;
  state.showLoginPrompt = false;
  window.removeEventListener('popstate', closeLoginPromptFromBack);
  render();
  // Undo the extra history entry we pushed when opening, without navigating away.
  history.back();
};

// Proceeding to the login page: clear the prompt and navigate to login,
// replacing the placeholder history entry the prompt pushed (rather than
// adding a new one on top of it, which would leave an extra back-stop).
window.goToLoginFromPrompt = function () {
  state.showLoginPrompt = false;
  window.removeEventListener('popstate', closeLoginPromptFromBack);
  go({ name: 'login' }, { replace: true });
};

window.updateGuestQty = function (productId, qty) {
  const item = state.guestCart.find(i => i.productId === productId);
  if (!item) return;
  if (qty <= 0) { state.guestCart = state.guestCart.filter(i => i.productId !== productId); }
  else { item.quantity = qty; }
  saveGuestCart();
  render();
};
window.removeGuestItem = function (productId) {
  state.guestCart = state.guestCart.filter(i => i.productId !== productId);
  saveGuestCart();
  render();
};

/* expose functions used inline */

window.addToCart = addToCart;
window.updateQty = updateQty;
window.removeItem = removeItem;

/* ---------------- Boot ---------------- */
(async function boot() {
  loadGuestCart(); // Fix #18: load guest cart from localStorage on startup
  document.getElementById('app').innerHTML = `<div class="spinner-wrap">Loading JJ Mart…</div>`;
  history.replaceState({ route: state.route }, '', '');
  await Promise.all([loadCategories(), loadSettings(), refreshSession()]);
  sb.auth.onAuthStateChange(async (_event, session) => {
    state.user = session?.user || null;
    if (state.user) {
      const { data: profile } = await sb.from('profiles').select('*').eq('id', state.user.id).single();
      state.profile = profile;
    } else {
      state.profile = null;
    }
    await loadCart();
    // Fix #18: merge any guest cart items into the logged-in cart
    if (state.user) await mergeGuestCartOnLogin();
  });
  render();
})();
